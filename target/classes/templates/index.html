<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>脏话自动和谐 — 想骂又能发得出去</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef6f1;
            --ink: #14241e;
            --muted: #5c7368;
            --accent: #1faa6a;
            --accent-deep: #168a55;
            --warm: #f4a261;
            --danger: #e04848;
            --danger-deep: #c83c3c;
            --panel: rgba(255, 255, 255, 0.88);
            --line: #cfe5d8;
            --result: #e6f7ee;
            --shadow: 0 18px 50px rgba(20, 36, 30, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(ellipse 70% 45% at 12% -10%, #c8f0d8 0%, transparent 55%),
                radial-gradient(ellipse 55% 40% at 100% 0%, #ffe2b8 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 80% 100%, #d7efe4 0%, transparent 45%),
                linear-gradient(180deg, #f5faf7 0%, var(--bg) 100%);
        }

        .page {
            width: min(720px, 100%);
            margin: 0 auto;
            padding: 40px 18px 56px;
            position: relative;
        }

        /* 右上角退出按钮容器 */
        .top-exit-wrap {
            position: absolute;
            top: 36px;
            right: 18px;
        }

        .exit-feedback {
            position: absolute;
            top: calc(50% + 5mm);
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 36, 30, 0.92);
            color: #fff;
            padding: 12px 20px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 10px 24px rgba(20, 36, 30, 0.24);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 2;
            white-space: nowrap;
        }

        .exit-feedback.show {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .brand {
            font-family: "ZCOOL XiaoWei", "Noto Sans SC", serif;
            font-size: clamp(2.2rem, 6vw, 3rem);
            line-height: 1.15;
            letter-spacing: 0.04em;
            margin: 0 0 14px;
            animation: rise 0.7s ease both;
        }

        .hook {
            margin: 0 0 10px;
            font-size: clamp(1.05rem, 2.6vw, 1.25rem);
            font-weight: 700;
            line-height: 1.55;
            animation: rise 0.7s ease 0.08s both;
        }

        .lead {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.7;
            max-width: 36em;
            animation: rise 0.7s ease 0.14s both;
        }

        .demo {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
            align-items: center;
            margin: 0 0 28px;
            font-size: 0.92rem;
            animation: rise 0.7s ease 0.2s both;
        }

        .chip {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid var(--line);
            line-height: 1.4;
        }

        .chip.before { color: #8a4b3a; text-decoration: line-through; opacity: 0.85; }
        .chip.after { color: var(--accent-deep); font-weight: 600; background: #e8f8ef; }
        .arrow { color: var(--warm); font-weight: 700; }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 26px 24px 24px;
            animation: rise 0.75s ease 0.26s both;
        }

        .panel-title {
            margin: 0 0 6px;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .panel-hint {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.55;
        }

        label {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 14px 16px;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            font: inherit;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--ink);
            background: #fff;
            resize: vertical;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        textarea::placeholder { color: #93a89e; }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31, 170, 106, 0.18);
        }

        .actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .nudge {
            color: var(--muted);
            font-size: 0.85rem;
        }

        button {
            appearance: none;
            border: none;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            border-radius: 999px;
            transition: transform 0.12s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .btn-harmony {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: #fff;
            font-size: 1.02rem;
            padding: 12px 28px;
            box-shadow: 0 8px 20px rgba(31, 170, 106, 0.28);
        }

        .btn-harmony:hover {
            filter: brightness(1.05);
            box-shadow: 0 10px 24px rgba(31, 170, 106, 0.34);
        }

        /* ===== 退出按钮样式，和和谐按钮动效完全统一 ===== */
        .btn-shutdown {
            background: linear-gradient(135deg, var(--danger) 0%, var(--danger-deep) 100%);
            position: relative;   /* 新增 */
            z-index: 3;        /* 新增，比 .exit-feedback 的 z-index: 2 高 */
            color: #fff;
            font-size: 0.9rem;
            padding: 12px 22px;
            box-shadow: 0 6px 16px rgba(224, 72, 72, 0.25);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            min-height: 44px;
        }

        .btn-shutdown:hover {
            filter: brightness(1.05);
            box-shadow: 0 10px 24px rgba(224, 72, 72, 0.32);
        }

        .btn-shutdown,
        .btn-shutdown:hover,
        .btn-shutdown:focus-visible {
            cursor: pointer;
        }

        .btn-shutdown--active {
            animation: shutdownBurst 0.45s ease both;
        }

        @keyframes shutdownBurst {
            0% { transform: scale(1); filter: brightness(1); }
            40% { transform: scale(0.96); }
            70% { transform: scale(1.04); filter: brightness(1.08); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        button:active { transform: scale(0.98); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 36, 30, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1200;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-card {
            width: min(360px, 100%);
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(20, 36, 30, 0.16);
            padding: 22px 20px 20px;
            animation: pop 0.28s ease both;
        }

        .modal-title {
            margin: 0 0 8px;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--ink);
        }

        .modal-message {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.65;
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel,
        .btn-confirm {
            padding: 10px 16px;
            min-width: 92px;
        }

        .btn-cancel {
            background: #f3f7f4;
            color: var(--ink);
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--danger) 0%, var(--danger-deep) 100%);
            color: #fff;
        }

        .btn-cancel:hover,
        .btn-confirm:hover {
            filter: brightness(1.03);
        }

        .exit-done {
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--ink);
            background: linear-gradient(180deg, #f5faf7 0%, var(--bg) 100%);
            padding: 24px;
        }

        .result {
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px dashed var(--line);
            animation: pop 0.45s ease both;
        }

        .result-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .result h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
        }

        .result-tag {
            font-size: 0.8rem;
            color: var(--accent-deep);
            font-weight: 600;
        }

        .result-box {
            background: var(--result);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px 18px;
            font-size: 1.06rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-hint {
            color: var(--muted);
            font-style: italic;
        }

        .footer {
            margin-top: 22px;
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.6;
            animation: rise 0.7s ease 0.35s both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 520px) {
            .page { padding-top: 28px; }
            .top-exit-wrap {
                position: relative;
                text-align: right;
                margin-bottom:16px;
            }
            .actions { flex-direction: column; align-items: stretch; }
            .btn-harmony { width: 100%; }
            .nudge { text-align: center; order: 1; }
        }
    </style>
</head>
<body>
<main class="page">
    <!-- 右上角退出按钮 -->
    <div class="top-exit-wrap">
        <div class="exit-feedback" id="exitFeedback">正在处理退出…</div>
        <button type="button" class="btn-shutdown" id="closeAppBtn">退出程序</button>
    </div>

    <h1 class="brand">脏话自动和谐</h1>
    <p class="hook">还在为一肚子骂人的话打出来却发不出去吗？</p>
    <p class="lead">
        平台一和谐、好友一举报，情绪还没释放完，消息就已经变星号了。
        把难听的话丢进来，点一下「和谐一下」——意思还在，火力变柔，聊天弹幕都能过关。
    </p>

    <div class="demo" aria-hidden="true">
        <span class="chip before">卧槽这太傻逼了</span>
        <span class="arrow">→</span>
        <span class="chip after">我焯这太沙雕了</span>
    </div>

    <section class="panel">
        <p class="panel-title">把气话丢进来</p>
        <p class="panel-hint">专治「想骂又不敢骂、骂了发不出去、发出去太伤感情」。</p>

        <form method="post" th:action="@{/censor}">
            <label for="text">待和谐文本</label>
            <textarea id="text" name="text"
                      placeholder="例如：你妈的，这破系统也太傻逼了，卧槽……"
                      th:text="${original}"></textarea>
            <div class="actions">
                <span class="nudge">别憋着了，先和谐，再发送。</span>
                <button type="submit" class="btn-harmony">和谐一下</button>
            </div>
        </form>

        <div class="result" th:if="${result != null}">
            <div class="result-head">
                <h2>可发送版出炉</h2>
                <span class="result-tag">复制就能发</span>
            </div>
            <div class="result-box" th:text="${result}"
                 th:classappend="${#strings.isEmpty(result)} ? ' empty-hint' : ''">
            </div>
        </div>
    </section>

    <p class="footer">情绪到位，敏感词退场 · 仅供学习娱乐，请理性表达</p>
</main>

<div class="modal-overlay" id="exitModal" role="dialog" aria-modal="true" aria-labelledby="exitModalTitle">
    <div class="modal-card">
        <h3 class="modal-title" id="exitModalTitle">确认退出</h3>
        <p class="modal-message" id="exitModalMessage">是否确定退出和谐程序？确认后会先停止后端服务，再关闭当前页面。</p>
        <div class="modal-actions">
            <button type="button" class="btn-cancel" id="exitCancelBtn">取消</button>
            <button type="button" class="btn-confirm" id="exitConfirmBtn">确认退出</button>
        </div>
    </div>
</div>

<script>
const autoLaunchFlag = location.search.includes('autoLaunch=1');

// 页面关闭兜底监听
window.addEventListener('pagehide', function(e) {
    if (autoLaunchFlag && !e.persisted) {
        navigator.sendBeacon('/sys/shutdown');
    }
});

// 右上角退出按钮逻辑
const closeBtn = document.getElementById('closeAppBtn');
const exitModal = document.getElementById('exitModal');
const exitModalTitle = document.getElementById('exitModalTitle');
const exitModalMessage = document.getElementById('exitModalMessage');
const exitCancelBtn = document.getElementById('exitCancelBtn');
const exitConfirmBtn = document.getElementById('exitConfirmBtn');
const exitFeedback = document.getElementById('exitFeedback');

function openExitModal() {
    exitModal.classList.add('show');
}

function closeExitModal() {
    exitModal.classList.remove('show');
}

function showFeedback(text) {
    if (!exitFeedback) return;
    exitFeedback.textContent = text;
    exitFeedback.classList.add('show');
}

function finishExitFlow() {
    exitModalTitle.textContent = '程序已退出';
    exitModalMessage.textContent = '页面已结束显示，后端服务正在关闭。';
    exitConfirmBtn.disabled = true;
    exitCancelBtn.textContent = '关闭';
}

function shutdownPage() {
    window.__pageClosing = true;
    showFeedback('正在退出，请稍候…');

    fetch('/sys/shutdown', { method: 'POST', keepalive: true })
        .then(function() {
            showFeedback('后端已停止，页面即将结束');
        })
        .catch(function() {
            showFeedback('未检测到后端服务，已结束页面');
        });

    finishExitFlow();

    setTimeout(function() {
        try {
            document.body.innerHTML = '<div class="exit-done">程序已退出</div>';
        } catch (e) {}
    }, 700);
}

function initExitFlow() {
    console.log('[exit] initExitFlow running');

    if (!closeBtn || !exitModal || !exitCancelBtn || !exitConfirmBtn) {
        console.error('[exit] missing elements', {
            closeBtn: !!closeBtn,
            exitModal: !!exitModal,
            exitCancelBtn: !!exitCancelBtn,
            exitConfirmBtn: !!exitConfirmBtn
        });
        return;
    }

    closeBtn.addEventListener('click', function(e) {
        e.preventDefault();
        closeBtn.classList.add('btn-shutdown--active');
        setTimeout(function() {
            closeBtn.classList.remove('btn-shutdown--active');
        }, 450);
        openExitModal();
    });

    exitCancelBtn.addEventListener('click', function(e) {
        e.preventDefault();
        if (exitConfirmBtn.disabled) {
            shutdownPage();
            return;
        }
        closeExitModal();
    });

    exitConfirmBtn.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('[exit] confirm clicked');
        shutdownPage();
    });

    exitModal.addEventListener('click', function(e) {
        e.preventDefault();
        if (e.target === exitModal) {
            if (exitConfirmBtn.disabled) {
                shutdownPage();
            } else {
                closeExitModal();
            }
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && exitModal.classList.contains('show')) {
            if (exitConfirmBtn.disabled) {
                shutdownPage();
            } else {
                closeExitModal();
            }
        }
    });
}

initExitFlow();

// 退出期间阻止表单继续提交，避免 /censor 请求被浏览器取消并标红
(function() {
    var form = document.querySelector('form[method="post"]');
    if (!form) return;
    form.addEventListener('submit', function(e) {
        if (window.__pageClosing) {
            e.preventDefault();
            showFeedback('页面正在退出，无法执行和谐操作');
        }
    });
})();
</script>
</body>
</html>
