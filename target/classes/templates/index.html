<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>脏话自动和谐 — 想骂又能发得出去</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef6f1;
            --ink: #14241e;
            --muted: #5c7368;
            --accent: #1faa6a;
            --accent-deep: #168a55;
            --warm: #f4a261;
            --panel: rgba(255, 255, 255, 0.88);
            --line: #cfe5d8;
            --result: #e6f7ee;
            --shadow: 0 18px 50px rgba(20, 36, 30, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(ellipse 70% 45% at 12% -10%, #c8f0d8 0%, transparent 55%),
                radial-gradient(ellipse 55% 40% at 100% 0%, #ffe2b8 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 80% 100%, #d7efe4 0%, transparent 45%),
                linear-gradient(180deg, #f5faf7 0%, var(--bg) 100%);
        }

        .page {
            width: min(720px, 100%);
            margin: 0 auto;
            padding: 40px 18px 56px;
        }

        .brand {
            font-family: "ZCOOL XiaoWei", "Noto Sans SC", serif;
            font-size: clamp(2.2rem, 6vw, 3rem);
            line-height: 1.15;
            letter-spacing: 0.04em;
            margin: 0 0 14px;
            animation: rise 0.7s ease both;
        }

        .hook {
            margin: 0 0 10px;
            font-size: clamp(1.05rem, 2.6vw, 1.25rem);
            font-weight: 700;
            line-height: 1.55;
            animation: rise 0.7s ease 0.08s both;
        }

        .lead {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.7;
            max-width: 36em;
            animation: rise 0.7s ease 0.14s both;
        }

        .demo {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
            align-items: center;
            margin: 0 0 28px;
            font-size: 0.92rem;
            animation: rise 0.7s ease 0.2s both;
        }

        .chip {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid var(--line);
            line-height: 1.4;
        }

        .chip.before { color: #8a4b3a; text-decoration: line-through; opacity: 0.85; }
        .chip.after { color: var(--accent-deep); font-weight: 600; background: #e8f8ef; }
        .arrow { color: var(--warm); font-weight: 700; }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 26px 24px 24px;
            box-shadow: var(--shadow);
            animation: rise 0.75s ease 0.26s both;
        }

        .panel-title {
            margin: 0 0 6px;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .panel-hint {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.55;
        }

        label {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 14px 16px;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            font: inherit;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--ink);
            background: #fff;
            resize: vertical;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        textarea::placeholder { color: #93a89e; }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31, 170, 106, 0.18);
        }

        .actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .nudge {
            color: var(--muted);
            font-size: 0.85rem;
        }

        button {
            appearance: none;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: #fff;
            font: inherit;
            font-size: 1.02rem;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(31, 170, 106, 0.28);
            transition: transform 0.12s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        button:hover {
            filter: brightness(1.05);
            box-shadow: 0 10px 24px rgba(31, 170, 106, 0.34);
        }

        button:active { transform: scale(0.98); }

        .result {
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px dashed var(--line);
            animation: pop 0.45s ease both;
        }

        .result-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .result h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
        }

        .result-tag {
            font-size: 0.8rem;
            color: var(--accent-deep);
            font-weight: 600;
        }

        .result-box {
            background: var(--result);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px 18px;
            font-size: 1.06rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-hint {
            color: var(--muted);
            font-style: italic;
        }

        .footer {
            margin-top: 22px;
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.6;
            animation: rise 0.7s ease 0.35s both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 520px) {
            .page { padding-top: 28px; }
            .actions { flex-direction: column; align-items: stretch; }
            button { width: 100%; }
            .nudge { text-align: center; order: 1; }
        }
    </style>
</head>
<body>
<main class="page">
    <h1 class="brand">脏话自动和谐</h1>
    <p class="hook">还在为一肚子骂人的话打出来却发不出去吗？</p>
    <p class="lead">
        平台一和谐、好友一举报，情绪还没释放完，消息就已经变星号了。
        把难听的话丢进来，点一下「和谐一下」——意思还在，火力变柔，聊天弹幕都能过关。
    </p>

    <div class="demo" aria-hidden="true">
        <span class="chip before">卧槽这太傻逼了</span>
        <span class="arrow">→</span>
        <span class="chip after">我焯这太沙雕了</span>
    </div>

    <section class="panel">
        <p class="panel-title">把气话丢进来</p>
        <p class="panel-hint">专治「想骂又不敢骂、骂了发不出去、发出去太伤感情」。</p>

        <form method="post" th:action="@{/censor}">
            <label for="text">待和谐文本</label>
            <textarea id="text" name="text"
                      placeholder="例如：你妈的，这破系统也太傻逼了，卧槽……"
                      th:text="${original}"></textarea>
            <div class="actions">
                <span class="nudge">别憋着了，先和谐，再发送。</span>
                <button type="submit">和谐一下</button>
            </div>
        </form>

        <div class="result" th:if="${result != null}">
            <div class="result-head">
                <h2>可发送版出炉</h2>
                <span class="result-tag">复制就能发</span>
            </div>
            <div class="result-box" th:text="${result}"
                 th:classappend="${#strings.isEmpty(result)} ? ' empty-hint' : ''">
            </div>
        </div>
    </section>

    <p class="footer">情绪到位，敏感词退场 · 仅供学习娱乐，请理性表达</p>
</main>
</body>
</html>
