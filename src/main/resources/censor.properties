# 脏话和谐映射表（单字映射）
# 修改后重启应用即可生效；逐字替换，不考虑上下文

# —— 核心脏字 ——
妈=冯
逼=福
操=草
日=曰
屎=翔
肏=草
屌=吊
婊=表
贱=剑
蠢=春
屁=匹
滚=辊
死=屎
杀=纱
鸡=吉
巴=⑧
蛋=淡
射=设
奸=坚
屁=P
# “屁”同时有“匹”和“P”，二选一，这里用“P”更互联网化
# 若希望全汉字，可改用“匹”

# —— 感叹/语气词 ——
艹=草
卧=我
槽=焯

# —— 贬称/侮辱字 ——
傻=沙
脑=恼
残=灿
贱=键
货=霍
蠢=春
笨=本
疯=风
呆=袋
骚=嫂
贱=见
# “贱”已映射为“剑”，这里重新统一映射为“见”，保持一致
# 或统一用“剑”，取决于你偏好。我统一用“剑”作为和谐字。
婊=表

# —— 其他常见替换 ——
蛋=淡
麻=马
尼=泥
# “尼”不是脏字，但在“尼玛”中常被和谐，单字映射会导致所有“尼”变“泥”
# 如觉得误伤太严重，可去除“尼=泥”这一行